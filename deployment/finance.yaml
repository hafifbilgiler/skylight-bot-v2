apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-finans
  namespace: skylight-bot-v2
  labels:
    app: skylight-finans
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-finans
  template:
    metadata:
      labels:
        app: skylight-finans
    spec:
      containers:
      - name: finans
        image: docker.io/hafifbilgiler/skylight-finans:1.5
        imagePullPolicy: Always
        ports:
        - containerPort: 8090
        env:
        - name: WHALE_USD_THRESH
          value: "500000"
        - name: DEEPINFRA_BASE_URL
          value: "https://api.deepinfra.com/v1/openai"
        - name: FINANS_LLM_MODEL
          value: "Qwen/Qwen3.5-4B"
        - name: DEEPINFRA_API_KEY
          valueFrom:
            secretKeyRef:
              name: smart-tools-secret
              key: DEEPINFRA_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 20
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: skylight-finans
  namespace: skylight-bot-v2
spec:
  type: ClusterIP
  selector:
    app: skylight-finans
  ports:
  - port: 8090
    targetPort: 8090
    nodePort: 30299
  type: NodePort