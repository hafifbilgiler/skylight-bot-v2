apiVersion: apps/v1
kind: Deployment
metadata:
  name: one-bune-payment-service
  namespace: skylight-bot-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: one-bune-payment-service
  template:
    metadata:
      labels:
        app: one-bune-payment-service
    spec:
      containers:
        - name: payment-service
          image: docker.io/hafifbilgiler/onebune-payment-service:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
          env:
            - name: IYZICO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: api-key
            - name: IYZICO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: secret-key
            - name: IYZICO_BASE_URL
              value: "https://sandbox-api.iyzipay.com"
            - name: PAYMENT_CALLBACK_URL
              value: "https://one-bune.com/payment/iyzico-callback.php"
            - name: APP_PUBLIC_URL
              value: "https://one-bune.com"
            - name: IYZICO_MONTHLY_PLAN_CODE
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: monthly-plan-code
            - name: PAYMENT_HTTP_TIMEOUT
              value: "45"
---
apiVersion: v1
kind: Service
metadata:
  name: one-bune-payment-service
  namespace: skylight-bot-v2
spec:
  selector:
    app: one-bune-payment-service
  ports:
    - name: http
      port: 8005
      targetPort: 8005
  type: ClusterIP