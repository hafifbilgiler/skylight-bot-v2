apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: skylight-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: docker.io/hafifbilgiler/skylight-payment:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: IYZICO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: api-key
            - name: IYZICO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: secret-key
            - name: IYZICO_BASE_URL
              value: "https://sandbox-api.iyzipay.com"
            - name: PAYMENT_CALLBACK_URL
              value: "https://one-bune.com/payment/iyzico-callback.php"
            - name: APP_PUBLIC_URL
              value: "https://one-bune.com"
            - name: IYZICO_MONTHLY_PLAN_CODE
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: monthly-plan-code
            - name: PAYMENT_HTTP_TIMEOUT
              value: "45"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: skylight-bot
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001