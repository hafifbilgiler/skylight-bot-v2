apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-payment-service
  namespace: skylight-bot-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-payment-service
  template:
    metadata:
      labels:
        app: skylight-payment-service
    spec:
      containers:
        - name: payment-service
          image: docker.io/hafifbilgiler/skylight-payment-service:2.6
          imagePullPolicy: Always
          ports:
            - containerPort: 8005

          env:
            # iyzico
            - name: IYZICO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: api-key

            - name: IYZICO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: secret-key

            - name: IYZICO_MONTHLY_PLAN_CODE
              valueFrom:
                secretKeyRef:
                  name: iyzico-secret
                  key: monthly-plan-code

            - name: IYZICO_BASE_URL
              value: "https://api.iyzipay.com"   # production

            # ONE-BUNE URLs
            - name: PAYMENT_CALLBACK_URL
              value: "https://one-bune.com/payment/callback.php"

            - name: APP_PUBLIC_URL
              value: "https://one-bune.com"

            - name: PAYMENT_HTTP_TIMEOUT
              value: "45"

            # JWT — gateway ile aynı secret
            - name: JWT_SECRET
              value: "31aad766798d891f4c587d7f3bc925cd7e1e14989c421ae3c38eb80c1d4ede05"
            # Database
            - name: DB_HOST
              value: "postgres"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: dbname

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: username

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: password
            # SMTP — gateway ile aynı
            - name: SMTP_SERVER
              value: "smtp.hostinger.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: smtp-user
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: smtp-pass
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: smtp-user
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          livenessProbe:
            httpGet:
              path: /payment/health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /payment/health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: skylight-payment-service
  namespace: skylight-bot-v2
spec:
  selector:
    app: skylight-payment-service
  ports:
    - name: http
      protocol: TCP
      port: 8005
      targetPort: 8005
      nodePort: 31241
  type: NodePort