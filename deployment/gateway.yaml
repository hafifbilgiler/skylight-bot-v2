apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-gateway
  namespace: skylight-bot-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-gateway
  template:
    metadata:
      labels:
        app: skylight-gateway
    spec:
      containers:
      - name: gateway
        image: docker.io/hafifbilgiler/skylight-gateway:1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8443
        volumeMounts:
        - name: tls
          mountPath: /tls
          readOnly: true
        env:
        # Database
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: pg-secret
              key: dbname
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: pg-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pg-secret
              key: password
        
        # JWT & API Token
        - name: JWT_SECRET
          value: "31aad766798d891f4c587d7f3bc925cd7e1e14989c421ae3c38eb80c1d4ede05"
        - name: API_TOKEN
          value: "31aad766798d891f4c587d7f3bc925cd7e1e14989c421ae3c38eb80c1d4ede05"
        
        # SMTP (OTP için)
        - name: SMTP_SERVER
          value: "smtp.hostinger.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: smtp-user
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: smtp-pass
        - name: FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: smtp-user
        
        # ClamAV (virus scanning)
        - name: CLAMAV_ENABLED
          value: "true"
        - name: CLAMAV_HOST
          value: "skylight-bot-antivirus"
        - name: CLAMAV_PORT
          value: "3310"
        
        # Abuse Control
        - name: ABUSE_CONTROL_URL
          value: "http://skylight-bot-abuse-control:8010"
        - name: ABUSE_CONTROL_ENABLED
          value: "true"
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        command:
        - uvicorn
        - app:app
        - --host
        - 0.0.0.0
        - --port
        - "8443"
        - --ssl-keyfile
        - /tls/api.key
        - --ssl-certfile
        - /tls/api.crt
        - --ssl-ca-certs
        - /tls/ca.crt
        - --ssl-cert-reqs
        - "2"
      volumes:
      - name: tls
        secret:
          secretName: skylight-api-tls
---
apiVersion: v1
kind: Service
metadata:
  name: skylight-gateway
  namespace: skylight-bot-v2
spec:
  selector:
    app: skylight-gateway
  ports:
  - protocol: TCP
    port: 8443
    targetPort: 8443
  type: ClusterIP