apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-gateway
  namespace: skylight-bot-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-gateway
  template:
    metadata:
      labels:
        app: skylight-gateway
    spec:
      containers:
      - name: gateway
        image: docker.io/hafifbilgiler/skylight-gateway:5.1 # ✅ 5.0, 4.5 4.3 stabil yeni 4.2YENİ IMAGE2.7 şuana kadar3.9,3.3 3.5en iyisi2.9 ,3.0,3.2test ediliuyor,2.8 hata aldı kodda 2.8 olan var
        imagePullPolicy: Always
        ports:
        - containerPort: 8443
        volumeMounts:
        - name: tls
          mountPath: /tls
          readOnly: true
        env:
        # Database
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: pg-secret
              key: dbname
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: pg-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pg-secret
              key: password
        
        # JWT & API Token — artık secret'tan
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: gateway-secret
              key: jwt-secret
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gateway-secret
              key: api-token
        
        # SMTP (OTP için)
        - name: SMTP_SERVER
          value: "smtp.hostinger.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: smtp-user
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: smtp-pass
        - name: FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: smtp-user
        
        # ClamAV (virus scanning)
        - name: CLAMAV_ENABLED
          value: "true"
        - name: CLAMAV_HOST
          value: "skylight-bot-antivirus"
        - name: CLAMAV_PORT
          value: "3310"
        
        # Abuse Control
        - name: ABUSE_CONTROL_URL
          value: "http://skylight-bot-abuse-control:8010"
        - name: ABUSE_CONTROL_ENABLED
          value: "true"
        
        # Microservices URLs (YENİ!)
        - name: CHAT_SERVICE_URL
          value: "http://skylight-chat:8082"
        - name: RAG_SERVICE_URL
          value: "http://skylight-rag:8084"
        - name: IMAGE_GEN_SERVICE_URL
          value: "http://skylight-image-gen:8083"
        - name: IMAGE_ANALYSIS_SERVICE_URL
          value: "http://skylight-image-analysis:8002"
        - name: SMART_TOOLS_URL
          value: "http://skylight-smart-tools:8081"
        - name: DEEPINFRA_CODE_MAX_TOKENS
          value: "16000"   # 4096 → 16000
        # ── Admin Panel ──────────────────────────────────
        # OTP doğrulama kodu bu adrese gönderilir
        - name: ADMIN_NOTIFICATION_EMAIL
          value: "serkan.ozmn.so@gmail.com"   # ← buraya yaz
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        command:
        - uvicorn
        - app:app
        - --host
        - 0.0.0.0
        - --port
        - "8443"
        - --ssl-keyfile
        - /tls/api.key
        - --ssl-certfile
        - /tls/api.crt
        - --ssl-ca-certs
        - /tls/ca.crt
        - --ssl-cert-reqs
        - "2"
      volumes:
      - name: tls
        secret:
          secretName: skylight-api-tls
---
apiVersion: v1
kind: Service
metadata:
  name: skylight-gateway
  namespace: skylight-bot-v2
spec:
  selector:
    app: skylight-gateway
  ports:
  - protocol: TCP
    port: 8443
    targetPort: 8443
  type: NodePort