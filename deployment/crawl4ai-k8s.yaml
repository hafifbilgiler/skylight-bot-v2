apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawl4ai
  namespace: skylight-bot-v2
  labels:
    app: crawl4ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawl4ai
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: crawl4ai
    spec:
      containers:
        - name: crawl4ai
          image: unclecode/crawl4ai:basic
          imagePullPolicy: Always
          ports:
            - containerPort: 11235
          env:
            - name: MAX_CONCURRENT_TASKS
              value: "3"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 11235
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 11235
            initialDelaySeconds: 40
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: crawl4ai
  namespace: skylight-bot-v2
spec:
  type: ClusterIP
  selector:
    app: crawl4ai
  ports:
    - port: 11235
      targetPort: 11235