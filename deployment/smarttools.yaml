apiVersion: v1
kind: ConfigMap
metadata:
  name: smart-tools-config
  namespace: skylight-bot-v2
data:
  SEARXNG_URL: "http://searxng:8080"
  DEEPINFRA_BASE_URL: "https://api.deepinfra.com/v1/openai"
  SYNTHESIS_MODEL: "meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8"
  REDIS_URL: "redis://skylight-redis:6379/2"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-smart-tools
  namespace: skylight-bot-v2
  labels:
    app: skylight-smart-tools
    version: "2.2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-smart-tools
  template:
    metadata:
      labels:
        app: skylight-smart-tools
        version: "2.2.0"
    spec:
      containers:
      - name: smart-tools
        image: docker.io/hafifbilgiler/smarttols:3.4 #2.2,2.3, 2.4, 2.8
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        env:
        # ── ConfigMap ──────────────────────────────────────
        - name: SEARXNG_URL
          valueFrom:
            configMapKeyRef:
              name: smart-tools-config
              key: SEARXNG_URL
        - name: DEEPINFRA_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: smart-tools-config
              key: DEEPINFRA_BASE_URL
        - name: SYNTHESIS_MODEL
          valueFrom:
            configMapKeyRef:
              name: smart-tools-config
              key: SYNTHESIS_MODEL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: smart-tools-config
              key: REDIS_URL
        # ── Secret ─────────────────────────────────────────
        - name: DEEPINFRA_API_KEY
          valueFrom:
            secretKeyRef:
              name: smart-tools-secret
              key: DEEPINFRA_API_KEY
        - name: BRAVE_API_KEY
          valueFrom:
            secretKeyRef:
              name: smart-tools-secret
              key: BRAVE_API_KEY
              optional: true
        - name: CRAWL4AI_URL
          value: "http://crawl4ai:11235"
        - name: RERANKER_URL
          value: "http://skylight-reranker:8087"
        - name: CRAWL4AI_TOKEN
          value: "skylight-crawl4ai-2026"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: skylight-smart-tools
  namespace: skylight-bot-v2
  labels:
    app: skylight-smart-tools
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: skylight-smart-tools
  sessionAffinity: None

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skylight-smart-tools-hpa
  namespace: skylight-bot-v2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skylight-smart-tools
  minReplicas: 1
  maxReplicas: 1
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80