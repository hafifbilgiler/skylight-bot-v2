apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-image-analysis
  namespace: skylight-bot-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-image-analysis
  template:
    metadata:
      labels:
        app: skylight-image-analysis
    spec:
      containers:
      - name: image-analysis
        image: docker.io/hafifbilgiler/skylight-image-analysis:1.2  # ⬆️ Hibrit (Gemini + DeepInfra fallback)
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
        env:
        # Redis
        - name: REDIS_URL
          value: "redis://skylight-redis:6379/0"
        - name: REDIS_TTL
          value: "86400"

        # ═══════════════════════════════════════════════════
        # VISION PROVIDER — gemini (default) | deepinfra
        # ═══════════════════════════════════════════════════
        - name: VISION_PROVIDER
          value: "gemini"

        # Gemini (Vertex AI) — Aktif
        - name: GEMINI_PROJECT
          value: "gen-lang-client-0907571701"
        - name: GEMINI_LOCATION
          value: "us-central1"
        - name: GEMINI_VISION_MODEL
          value: "gemini-2.5-flash-lite"
        - name: GEMINI_VISION_MAX_TOKENS
          value: "4096"
        - name: GEMINI_VISION_TEMPERATURE
          value: "0.4"

        # DeepInfra (Fallback) — VISION_PROVIDER=deepinfra ile aktif olur
        - name: DEEPINFRA_API_KEY
          value: "4hcNLCkZvisyP6wuD2sdY5NPFU2GjBSn"
        - name: DEEPINFRA_BASE_URL
          value: "https://api.deepinfra.com/v1/openai"
        - name: DEEPINFRA_VISION_MODEL
          value: "Qwen/Qwen3-VL-30B-A3B-Instruct"
        - name: DEEPINFRA_VISION_MAX_TOKENS
          value: "4096"
        - name: DEEPINFRA_VISION_TEMPERATURE
          value: "0.4"

        # Vertex SA key mount (chat-service ile aynı secret)
        volumeMounts:
        - name: vertex-sa-key
          mountPath: /etc/vertex-sa
          readOnly: true

        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"

      volumes:
      - name: vertex-sa-key
        secret:
          secretName: vertex-sa-key

---
apiVersion: v1
kind: Service
metadata:
  name: skylight-image-analysis
  namespace: skylight-bot-v2
spec:
  selector:
    app: skylight-image-analysis
  ports:
  - protocol: TCP
    port: 8002
    targetPort: 8002
  type: ClusterIP