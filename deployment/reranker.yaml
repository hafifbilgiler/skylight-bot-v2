# ═══════════════════════════════════════════════════════════════
# SKYLIGHT RERANKER — K8s Deployment
# BGE Reranker v2-m3 — CPU, lokal pod
# ═══════════════════════════════════════════════════════════════

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-reranker
  namespace: skylight-bot-v2
  labels:
    app: skylight-reranker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-reranker
  strategy:
    type: Recreate   # Model dosyaları için tek pod yeterli
  template:
    metadata:
      labels:
        app: skylight-reranker
    spec:
      containers:
        - name: reranker
          image: docker.io/hafifbilgiler/reranker:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
              name: http

          env:
            - name: RERANKER_MODEL
              value: "BAAI/bge-reranker-v2-m3"
            - name: USE_FP16
              value: "false"   # CPU için false
            - name: BATCH_SIZE
              value: "16"
            - name: MAX_LENGTH
              value: "512"

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"   # Model + inference buffer
              cpu: "2000m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 60   # Model yüklenene kadar bekle
            periodSeconds: 60
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 45
            periodSeconds: 60
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: skylight-reranker
  namespace: skylight-bot-v2
  labels:
    app: skylight-reranker
spec:
  type: ClusterIP
  selector:
    app: skylight-reranker
  ports:
    - port: 8087
      targetPort: 8087
      protocol: TCP
      name: http
