apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-sosyal
  namespace: skylight-bot-v2
  labels:
    app: skylight-sosyal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-sosyal
  template:
    metadata:
      labels:
        app: skylight-sosyal
    spec:
      volumes:
        - name: vertex-sa-key
          secret:
            secretName: vertex-sa-key
      containers:
        - name: sosyal
          image: docker.io/hafifbilgiler/skylight-sosyal:1.3
          ports:
            - containerPort: 8091
          env:
            - name: DEEPINFRA_BASE_URL
              value: "https://api.deepinfra.com/v1/openai"
            - name: SOSYAL_LLM_MODEL
              value: "meta-llama/Llama-3.2-3B-Instruct"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-tools-secret
                  key: GEMINI_API_KEY
                  optional: true
            - name: GEMINI_MODEL
              value: "gemini-1.5-flash"
            - name: DEEPINFRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-tools-secret
                  key: DEEPINFRA_API_KEY
            - name: GEMINI_PROJECT
              value: "gen-lang-client-0907571701"
            - name: GEMINI_LOCATION
              value: "us-central1"
            - name: GEMINI_MODEL
              value: "gemini-2.5-flash-lite"
          volumeMounts:
            - name: vertex-sa-key
              mountPath: /etc/vertex-sa
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: skylight-sosyal
  namespace: skylight-bot-v2
spec:
  selector:
    app: skylight-sosyal
  ports:
    - protocol: TCP
      port: 8091
      targetPort: 8091
      nodePort: 30291
  type: NodePort