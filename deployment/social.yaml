# ═══════════════════════════════════════════════════════════
# TRAVELPAYOUTS (Aviasales Flight Data API) Secret
# ═══════════════════════════════════════════════════════════
# Oluşturmak için (önerilen yöntem):
#   kubectl create secret generic travelpayouts-secret \
#     --from-literal=api-token=BURAYA_API_TOKEN \
#     --from-literal=marker-id=716107 \
#     -n skylight-bot-v2
#
# Veya aşağıdaki YAML'ı doldur — ama token'ı git'e commit ETME!
# ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: travelpayouts-secret
  namespace: skylight-bot-v2
type: Opaque
stringData:
  api-token: "feb7e3744f6c11751dfa26b9654021eb"   # travelpayouts.com/profile → API token
  marker-id: "716107"                            # Hafifbilgiler affiliate marker
---
# ═══════════════════════════════════════════════════════════
# skylight-sosyal Deployment — v2.1
# Değişiklikler:
#   v2.0 → v2.1
#   - Kiwi/Tequila secret KALDIRILDI
#   - Travelpayouts (Aviasales) entegrasyonu eklendi
#   - Yeni endpoint'ler: flight_search, flight_calendar,
#     flight_click, flight_parse
#   - Image tag güncellendi: 2.0 → 2.1
#
#   v1.5 → v2.0 (referans)
#   - DB bağlantısı eklendi (pg-secret)
#   - Redis bağlantısı eklendi
#   - JWT_SECRET eklendi (token doğrulama)
# ═══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-sosyal
  namespace: skylight-bot-v2
  labels:
    app: skylight-sosyal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skylight-sosyal
  template:
    metadata:
      labels:
        app: skylight-sosyal
    spec:
      containers:
        - name: sosyal
          image: docker.io/hafifbilgiler/skylight-sosyal:2.2
          ports:
            - containerPort: 8091

          env:
            # ── LLM (DeepInfra fallback) ────────────────────
            - name: DEEPINFRA_BASE_URL
              value: "https://api.deepinfra.com/v1/openai"
            - name: SOSYAL_LLM_MODEL
              value: "meta-llama/Llama-3.2-3B-Instruct"
            - name: DEEPINFRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-tools-secret
                  key: DEEPINFRA_API_KEY

            # ── Vertex AI (Gemini — ana LLM) ─────────────────
            - name: GEMINI_PROJECT
              value: "gen-lang-client-0907571701"
            - name: GEMINI_LOCATION
              value: "us-central1"
            - name: GEMINI_MODEL
              value: "gemini-2.5-flash-lite"

            # ── PostgreSQL ───────────────────────────────────
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: password

            # ── Redis (DB 5 — sosyal cache) ──────────────────
            - name: REDIS_URL
              value: "redis://skylight-redis:6379"
            - name: REDIS_DB
              value: "5"

            # ── JWT (token doğrulama — gateway ile aynı) ─────
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: jwt-secret

            # ── Travelpayouts / Aviasales API ────────────────
            # Flight Data API + affiliate linkler için
            - name: TRAVELPAYOUTS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: travelpayouts-secret
                  key: api-token
            - name: TRAVELPAYOUTS_MARKER
              valueFrom:
                secretKeyRef:
                  name: travelpayouts-secret
                  key: marker-id

          volumeMounts:
            - name: vertex-sa-key
              mountPath: /etc/vertex-sa
              readOnly: true

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: vertex-sa-key
          secret:
            secretName: vertex-sa-key
---
apiVersion: v1
kind: Service
metadata:
  name: skylight-sosyal
  namespace: skylight-bot-v2
spec:
  selector:
    app: skylight-sosyal
  ports:
    - protocol: TCP
      port: 8091
      targetPort: 8091
      nodePort: 30291
  type: NodePort