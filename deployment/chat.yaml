apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylight-chat
  namespace: skylight-bot-v2
spec:
  replicas: 2                        # ⬆️ 1 → 2 (yüksek erişilebilirlik)
  selector:
    matchLabels:
      app: skylight-chat
  template:
    metadata:
      labels:
        app: skylight-chat
    spec:
      containers:
      - name: chat
        image: docker.io/hafifbilgiler/skylight-chat:9.6
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
        env:
        # ── Database ────────────────────────────────────
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom: { secretKeyRef: { name: pg-secret, key: dbname } }
        - name: DB_USER
          valueFrom: { secretKeyRef: { name: pg-secret, key: username } }
        - name: DB_PASSWORD
          valueFrom: { secretKeyRef: { name: pg-secret, key: password } }

        # ── DeepInfra (Text + Code) ─────────────────────
        - name: DEEPINFRA_API_KEY
          value: "4hcNLCkZvisyP6wuD2sdY5NPFU2GjBSn"
        - name: DEEPINFRA_BASE_URL
          value: "https://api.deepinfra.com/v1/openai"
        - name: DEEPINFRA_MODEL
          value: "deepseek-ai/DeepSeek-V4-Flash"
        - name: DEEPINFRA_READ_TIMEOUT          # ✨ YENİ
          value: "900"

        # Models
        - name: DEEPINFRA_ASSISTANT_MODEL
          value: "deepseek-ai/DeepSeek-V4-Flash"
        - name: DEEPINFRA_ASSISTANT_MAX_TOKENS
          value: "16384"                        # ⬆️ 8192 → 16384
        - name: DEEPINFRA_ASSISTANT_TEMPERATURE
          value: "0.7"
        - name: DEEPINFRA_CODE_MODEL
          value: "deepseek-ai/DeepSeek-V4-Flash"
        - name: DEEPINFRA_CODE_TEMPERATURE
          value: "0.3"
        - name: DEEPINFRA_CODE_MAX_TOKENS
          value: "32000"

        # ── Smart Tools ─────────────────────────────────
        - name: SMART_TOOLS_URL
          value: "http://skylight-smart-tools:8081"

        # ── Chat Provider Switch ────────────────────────
        - name: CHAT_PROVIDER                   # ✨ YENİ
          value: "deepseek"

        # ── Vertex AI Gemini ────────────────────────────
        - name: GEMINI_PROJECT
          value: "gen-lang-client-0907571701"
        - name: GEMINI_LOCATION
          value: "us-central1"
        - name: GEMINI_MODEL
          value: "gemini-2.5-flash-lite"        # vision + chat (ucuz)
        - name: GEMINI_GROUNDING_MODEL
          value: "gemini-2.5-flash"             # web search (lite bug nedeniyle ayrı)

        # ── Vertex SA key mount ─────────────────────────
        volumeMounts:
        - name: vertex-sa-key
          mountPath: /etc/vertex-sa
          readOnly: true

        # ── Resources (artırıldı) ───────────────────────
        resources:
          requests:
            memory: "512Mi"     # ⬆️ 256 → 512
            cpu: "300m"         # ⬆️ 200 → 300
          limits:
            memory: "1.5Gi"     # ⬆️ 512 → 1.5Gi
            cpu: "1000m"        # ⬆️ 500 → 1000

        # ── Health checks (öneri) ───────────────────────
        livenessProbe:
          httpGet: { path: /health, port: 8082 }
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet: { path: /health, port: 8082 }
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3

      volumes:
      - name: vertex-sa-key
        secret:
          secretName: vertex-sa-key

---
apiVersion: v1
kind: Service
metadata:
  name: skylight-chat
  namespace: skylight-bot-v2
spec:
  selector:
    app: skylight-chat
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082
  type: ClusterIP