# ═══════════════════════════════════════════════════════════════
# SEARXNG — Production Ready
# ═══════════════════════════════════════════════════════════════
#
# Düzeltmeler:
#   ✅ settings.yml ownership: initContainer ile searxng:searxng yapılır
#   ✅ DuckDuckGo devre dışı — parser hatası (list index out of range)
#   ✅ limiter.toml ConfigMap'e eklendi — missing config uyarısı gider
#   ✅ forwarded_allow_ips: "*" — X-Forwarded-For uyarısı gider
#   ✅ Ahmia, Torch disabled — zaten fail oluyordu
# ═══════════════════════════════════════════════════════════════
 
---
apiVersion: v1
kind: Secret
metadata:
  name: searxng-secret
  namespace: skylight-bot-v2
  labels:
    app: searxng
type: Opaque
stringData:
  secret_key: "b597efad30dc58c0ade6a43a5aac2f1a36ead2628638b99cb3c50ab273c26f29"
 
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: skylight-bot-v2
  labels:
    app: searxng
data:
  settings.yml: |
    use_default_settings: true
 
    general:
      debug: false
      instance_name: "Skylight Search"
      enable_metrics: false
 
    search:
      safe_search: 1
      default_lang: "tr"
      languages:
        - "tr"
        - "en"
      formats:
        - html
        - json
 
    server:
      secret_key: "${SEARXNG_SECRET_KEY}"
      bind_address: "0.0.0.0"
      port: 8080
      base_url: false
      image_proxy: false
      method: "GET"
      forwarded_allow_ips: "*"
 
    botdetection:
      enabled: false
 
    ui:
      static_use_hash: true
      default_locale: "tr"
      theme_args:
        simple_style: "dark"
 
    engines:
      - name: bing
        engine: bing
        shortcut: b
        weight: 1.2
        categories: general
        disabled: false
        timeout: 8.0
 
      - name: google
        engine: google
        shortcut: g
        weight: 1.5
        categories: general
        disabled: true
        timeout: 10.0
 
      - name: startpage
        engine: startpage
        shortcut: sp
        weight: 1.0
        categories: general
        disabled: false
        timeout: 8.0
 
      - name: wikipedia
        engine: wikipedia
        shortcut: w
        weight: 0.8
        categories: general
        disabled: false
        timeout: 5.0
        language: tr
 
      - name: bing news
        engine: bing_news
        shortcut: bn
        categories: news
        weight: 1.0
        disabled: false
        timeout: 8.0
 
      - name: duckduckgo
        engine: duckduckgo
        shortcut: d
        disabled: true
 
      - name: ahmia
        engine: ahmia
        shortcut: ah
        disabled: true
 
      - name: torch
        engine: torch
        shortcut: to
        disabled: true
      - name: brave
        engine: brave
        shortcut: br
        disabled: true
    limiter:
      enabled: false
 
    redis_url: "redis://skylight-redis:6379/1"
 
  limiter.toml: |
    [botdetection.ip_limit]
    link_token = false
 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: skylight-bot-v2
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: searxng
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 977
        runAsGroup: 977
        fsGroup: 977
 
      # initContainer: ConfigMap dosyalarını kopyalayıp sahipliği düzelt
      initContainers:
        - name: fix-ownership
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config/settings.yml /searxng-config/settings.yml
              cp /config/limiter.toml /searxng-config/limiter.toml
              chown 977:977 /searxng-config/settings.yml /searxng-config/limiter.toml
              chmod 640 /searxng-config/settings.yml /searxng-config/limiter.toml
              echo "Done: $(ls -la /searxng-config/)"
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: searxng-config-source
              mountPath: /config
              readOnly: true
            - name: searxng-config-writable
              mountPath: /searxng-config
 
      containers:
        - name: searxng
          image: searxng/searxng:2026.3.20-6c7e9c197
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
 
          env:
            - name: SEARXNG_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: secret_key
            - name: SEARXNG_BASE_URL
              value: "http://searxng.skylight-bot-v2.svc.cluster.local:8080"
            - name: INSTANCE_NAME
              value: "Skylight Search"
 
          volumeMounts:
            - name: searxng-config-writable
              mountPath: /etc/searxng
 
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
 
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
 
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
 
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
 
      volumes:
        - name: searxng-config-source
          configMap:
            name: searxng-config
            items:
              - key: settings.yml
                path: settings.yml
              - key: limiter.toml
                path: limiter.toml
 
        - name: searxng-config-writable
          emptyDir: {}
 
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: skylight-bot-v2
  labels:
    app: searxng
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http

---
