# ═══════════════════════════════════════════════════════════════
# SEARXNG — Fixed (no root, no PVC permission issue)
# ═══════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: Secret
metadata:
  name: searxng-secret
  namespace: skylight-bot-v2
  labels:
    app: searxng
type: Opaque
stringData:
  secret_key: "b597efad30dc58c0ade6a43a5aac2f1a36ead2628638b99cb3c50ab273c26f29"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: skylight-bot-v2
  labels:
    app: searxng
data:
  settings.yml: |
    use_default_settings: true

    general:
      debug: false
      instance_name: "Skylight Search"
      enable_metrics: false

    search:
      safe_search: 1
      default_lang: "tr"
      languages:
        - "tr"
        - "en"
      formats:
        - html
        - json

    server:
      secret_key: "${SEARXNG_SECRET_KEY}"
      bind_address: "0.0.0.0"
      port: 8080
      base_url: false
      image_proxy: false
      method: "GET"

    botdetection:
      enabled: false

    ui:
      static_use_hash: true
      default_locale: "tr"
      theme_args:
        simple_style: "dark"

    engines:
      - name: bing
        engine: bing
        shortcut: b
        weight: 1.0
        categories: general
        disabled: false
        timeout: 8.0

      - name: duckduckgo
        engine: duckduckgo
        shortcut: d
        weight: 1.0
        categories: general
        disabled: false
        timeout: 8.0

      - name: wikipedia
        engine: wikipedia
        shortcut: w
        weight: 0.8
        categories: general
        disabled: false
        timeout: 5.0
        language: tr

      - name: google
        engine: google
        shortcut: g
        weight: 1.2
        categories: general
        disabled: false
        timeout: 10.0

      - name: startpage
        engine: startpage
        shortcut: sp
        weight: 0.9
        categories: general
        disabled: false
        timeout: 8.0

      - name: bing news
        engine: bing_news
        shortcut: bn
        categories: news
        weight: 1.0
        disabled: false
        timeout: 8.0

    limiter:
      enabled: false

    redis_url: "redis://skylight-redis:6379/1"

---
# PVC kaldırıldı — ConfigMap volume kullanıyoruz
# settings.yml her seferinde ConfigMap'ten gelir
# Pod restart'ta ayarlar kaybolmaz çünkü ConfigMap'te saklı

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: skylight-bot-v2
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: searxng
    spec:
      # ── Düzeltme 1: Tüm pod non-root ──────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 977
        runAsGroup: 977
        fsGroup: 977

      # ── Düzeltme 2: Init container kaldırıldı ─────────────
      # Root gerektiriyordu, cluster policy izin vermiyor
      # settings.yml direkt ConfigMap'ten mount ediliyor
      # initContainers: YOK

      containers:
        - name: searxng
          image: searxng/searxng:2026.3.20-6c7e9c197
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http

          env:
            - name: SEARXNG_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: secret_key
            - name: SEARXNG_BASE_URL
              value: "http://searxng.skylight-bot-v2.svc.cluster.local:8080"
            - name: INSTANCE_NAME
              value: "Skylight Search"

          volumeMounts:
            # ── Düzeltme 3: settings.yml doğrudan ConfigMap'ten ──
            - name: searxng-settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: searxng-settings
          configMap:
            name: searxng-config
            items:
              - key: settings.yml
                path: settings.yml

---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: skylight-bot-v2
  labels:
    app: searxng
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smart-tools-config
  namespace: skylight-bot-v2
data:
