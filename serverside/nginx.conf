# Rate limit zone'ları
limit_req_zone $binary_remote_addr zone=req_limit:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=chat_limit:10m  rate=1r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 8000 ssl;
    server_name api.one-bune.com;

    ssl_certificate     /etc/letsencrypt/live/api.one-bune.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.one-bune.com/privkey.pem;

    # SSL sıkılaştırma
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    limit_req zone=req_limit burst=10 nodelay;
    limit_conn conn_limit 10;
    client_max_body_size 15M;
    server_tokens off;

    # Güvenlik header'ları
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ====================================================
    # GATEWAY BASE URL
    # ====================================================
    set $gateway_url https://10.0.0.2:32722;  # Gateway NodePort

    # ====================================================
    # PAYMENT SERVICE URL (NodePort)
    # ====================================================
    set $payment_url http://10.0.0.2:31241;  # Payment Service NodePort

    # FINANCE
    set $finans_url  http://10.0.0.2:30299;
    # ====================================================
    # 1. CHAT ENDPOINT
    # ====================================================
    location /chat {
        limit_req zone=chat_limit burst=5 nodelay;
        proxy_pass $gateway_url/chat;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # ====================================================
    # 2. AUTH / OTP ENDPOINTS
    # ====================================================
    location ~ ^/(request_code|verify_code|check_user|login|register) {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass $gateway_url;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ====================================================
    # 3. RAG DEBUG ENDPOINT (Ops-only)
    # ====================================================
    location /debug/rag {
        proxy_pass $gateway_url/debug/rag;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ====================================================
    # 4. CONVERSATION ENDPOINTS
    # ====================================================
    location /conversations {
        proxy_pass $gateway_url;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # ====================================================
    # 5. USER PROFILE ENDPOINTS
    # ====================================================
    location /profile {
        proxy_pass $gateway_url;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ====================================================
    # 6. FILE UPLOAD ENDPOINT
    # ====================================================
    location /upload {
        proxy_pass $gateway_url/upload;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
        client_max_body_size 15M;
    }

    # ====================================================
    # 7. FEEDBACK ENDPOINT
    # ====================================================
    location /feedback {
        proxy_pass $gateway_url/feedback;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ====================================================
    # 8. CODE MODE STATUS ENDPOINT
    # ====================================================
    location /code-mode/ {
        proxy_pass $gateway_url;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ====================================================
    # 9. SUBSCRIPTION ENDPOINTS
    # ====================================================
    location /subscription/ {
        proxy_pass $gateway_url;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    # ====================================================
    # 10. ADMIN ENDPOINTS
    # ====================================================
    location /admin {
        proxy_pass $gateway_url;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ====================================================
    # 11. WEB SEARCH ENDPOINT
    # ====================================================
    location /web-search {
        proxy_pass $gateway_url/web-search;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ====================================================
    # 11.5 PAYMENT ENDPOINTS (NodePort)
    # ====================================================
    location /payment/ {
        proxy_pass $payment_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
        client_max_body_size 1M;
        proxy_buffering off;
    }

    # ====================================================
    # 12. HEALTH CHECK
    # ====================================================
    location /health {
        proxy_pass $gateway_url/health;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ====================================================
    # 13. ROOT ENDPOINT
    # ====================================================
    location = / {
        proxy_pass $gateway_url/;
        proxy_ssl_certificate         /etc/nginx/mtls/nginx-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/mtls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/mtls/ca.crt;
        proxy_ssl_verify              off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }


location ~ ^/finans/ws/(.*)$ {
    proxy_pass http://10.0.0.2:30299/ws/$1$is_args$args;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade"; # veya $connection_upgrade (eğer yukarıdaki map'i eklediysen)

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket için kritik ayarlar
    proxy_read_timeout 3600s; # Bağlantının boşta kalma süresi
    proxy_send_timeout 3600s;
    proxy_buffering off;       # Verinin anlık iletilmesi için şart
    proxy_cache off;
}


    # FİNANS REST — NodePort direkt
    location ~ ^/finans/(.*)$ {
        proxy_pass http://10.0.0.2:30299/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

}

server {
    listen 80;
    server_name api.one-bune.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
        return 301 https://api.one-bune.com:8000$request_uri;
    }
}